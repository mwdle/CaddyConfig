name: Caddy
services:
  Caddy:
    image: mwdle/caddy:latest
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: Caddy
    restart: unless-stopped
    hostname: caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    networks:
      CloudflareTunnel:
      ESPHome:
      forgejo:
        aliases:
          - ${JENKINS_HOSTNAME} # Forgejo connects to Jenkins via Caddy for webhooks
      Frigate:
      # Home Assistant connects to Frigate, Nextcloud, and Music Assistant via Caddy instead of Docker network for HTTPS access, no external routing via Cloudflare Tunnels, Music Assistant Music Art Proxy (avoids mixed content in browser), and increased isolation between containers/networks.
      HomeAssistant:
        aliases:
          - ${FRIGATE_HOSTNAME}
          - ${MA_HOSTNAME}
          - ${NEXTCLOUD_HOSTNAME}
      Jenkins:
        aliases:
          - ${FORGEJO_HOSTNAME} # Jenkins connects to Forgejo via Caddy for repository access, webhook configuration, etc.
          - ${VAULTWARDEN_HOSTNAME} # Jenkins connects to Vaultwarden via Caddy for providing credentials.
      MusicAssistant:
      Nextcloud:
      OpenWebUI:
      Renovate:
        aliases:
          - ${FORGEJO_HOSTNAME} # Renovate connects to Forgejo via Caddy
      Vaultwarden:
      VPA:
      wg-easy:
    environment:
      # Caddy variables
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - EMAIL=${EMAIL}
      - LOG_FILE=/data/access.log
      - TRUSTED_PROXIES=${TRUSTED_PROXIES}
      # Hostnames
      - COCKPIT_HOSTNAME=${COCKPIT_HOSTNAME}
      - ESPHOME_HOSTNAME=${ESPHOME_HOSTNAME}
      - FORGEJO_HOSTNAME=${FORGEJO_HOSTNAME}
      - FRIGATE_HOSTNAME=${FRIGATE_HOSTNAME}
      - HA_HOSTNAME=${HA_HOSTNAME}
      - JENKINS_HOSTNAME=${JENKINS_HOSTNAME}
      - MA_HOSTNAME=${MA_HOSTNAME}
      - NEXTCLOUD_HOSTNAME=${NEXTCLOUD_HOSTNAME}
      - OPENWEBUI_HOSTNAME=${OPENWEBUI_HOSTNAME}
      - VAULTWARDEN_HOSTNAME=${VAULTWARDEN_HOSTNAME}
      - VPA_HOSTNAME=${VPA_HOSTNAME}
      - WG_EASY_HOSTNAME=${WG_EASY_HOSTNAME}
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    volumes:
      - caddy_config:/config
      - caddy_data:/data
      - /run/cockpit.sock:/run/cockpit.sock

    user: "${UID}:${GID}"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    logging:
      driver: journald
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8888/health || exit 1
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: 1.5
          memory: 512M
          pids: 50

networks:
  CloudflareTunnel:
    external: true
  ESPHome:
    external: true
  forgejo:
    external: true
  Frigate:
    external: true
  HomeAssistant:
    external: true
  Jenkins:
    external: true
  MusicAssistant:
    external: true
  Nextcloud:
    external: true
  OpenWebUI:
    external: true
  Renovate:
    external: true
  Vaultwarden:
    external: true
  VPA:
    external: true
  wg-easy:
    external: true

configs:
  caddyfile:
    file: ./Caddyfile

volumes:
  caddy_config:
  caddy_data:
