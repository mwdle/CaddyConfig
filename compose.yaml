name: Caddy
services:
  Caddy:
    image: mwdle/caddy:latest
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: Caddy
    restart: unless-stopped
    hostname: caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    # Allow resolving host machine in order to reverse proxy Cockpit
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      Adguard:
      Vaultwarden:
      Nextcloud:
      CloudflareTunnel:
      VPA:
      Frigate:
      MusicAssistant:
      # Home Assistant connects to Frigate, Nextcloud, and Music Assistant via Caddy instead of Docker network for HTTPS access, no external routing via Cloudflare Tunnels, Music Assistant Music Art Proxy (avoids mixed content in browser), and increased isolation between containers/networks.
      HomeAssistant:
        aliases:
          - ${MA_HOSTNAME}
          - ${FRIGATE_HOSTNAME}
          - ${NEXTCLOUD_HOSTNAME}
      OpenWebUI:
      Gitea:
        aliases:
          - ${JENKINS_HOSTNAME} # Gitea connects to Jenkins via Caddy for webhooks
      Jenkins:
        aliases:
          - ${GITEA_HOSTNAME} # Jenkins connects to Gitea via Caddy for repository access, webhook configuration, etc.
          - ${VAULTWARDEN_HOSTNAME} # Jenkins connects to Vaultwarden via Caddy for providing credentials.
      ESPHome:
      Renovate:
        aliases:
          - ${GITEA_HOSTNAME} # Renovate connects to Gitea via Caddy
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - EMAIL=${EMAIL}
      - TRUSTED_PROXIES=${TRUSTED_PROXIES}
      - LOG_FILE=/data/access.log
      - NEXTCLOUD_HOSTNAME=${NEXTCLOUD_HOSTNAME}
      - ADGUARD_HOSTNAME=${ADGUARD_HOSTNAME}
      - VAULTWARDEN_HOSTNAME=${VAULTWARDEN_HOSTNAME}
      - HA_HOSTNAME=${HA_HOSTNAME}
      - VPA_HOSTNAME=${VPA_HOSTNAME}
      - FRIGATE_HOSTNAME=${FRIGATE_HOSTNAME}
      - MA_HOSTNAME=${MA_HOSTNAME}
      - COCKPIT_HOSTNAME=${COCKPIT_HOSTNAME}
      - OPENWEBUI_HOSTNAME=${OPENWEBUI_HOSTNAME}
      - GITEA_HOSTNAME=${GITEA_HOSTNAME}
      - JENKINS_HOSTNAME=${JENKINS_HOSTNAME}
      - ESPHOME_HOSTNAME=${ESPHOME_HOSTNAME}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

    user: "${UID}:${GID}"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    logging:
      driver: "journald"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:8888/health || exit 1",
        ]
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: 1.5
          memory: 512M
          pids: 50

networks:
  Adguard:
    external: true
  Vaultwarden:
    external: true
  Nextcloud:
    external: true
  CloudflareTunnel:
    external: true
  VPA:
    external: true
  Frigate:
    external: true
  HomeAssistant:
    external: true
  MusicAssistant:
    external: true
  OpenWebUI:
    external: true
  Gitea:
    external: true
  Jenkins:
    external: true
  ESPHome:
    external: true
  Renovate:
    external: true

volumes:
  caddy_data:
  caddy_config:
